version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: cap_postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: cap_user
      POSTGRES_PASSWORD: cap_password
      POSTGRES_DB: community_aid
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cap_user -d community_aid"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: cap_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cap_backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://cap_user:cap_password@postgres:5432/community_aid
      REDIS_URL: redis://redis:6379
      JWT_SECRET: super_secret_jwt_key_change_in_production
      JWT_REFRESH_SECRET: super_secret_refresh_key_change_in_production
      NLP_SERVICE_URL: http://nlp-service:5001
      PORT: 5000
      NODE_ENV: development
    volumes:
      - ./backend:/app
      - /app/node_modules
      - uploads:/app/uploads

  nlp-service:
    build:
      context: ./nlp-service
      dockerfile: Dockerfile
    container_name: cap_nlp
    restart: unless-stopped
    ports:
      - "5001:5001"
    environment:
      FLASK_ENV: development
      PORT: 5001

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: cap_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      VITE_API_URL: http://localhost:5000/api
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  pgdata:
  redisdata:
  uploads:
